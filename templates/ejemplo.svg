<svg width="600" height="300" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo -->
  <rect width="100%" height="100%" fill="#2c3e50" rx="15" />
  
  <!-- Borde decorativo -->
  <rect x="20" y="20" width="560" height="260" fill="none" stroke="#ecf0f1" stroke-width="4" rx="10" stroke-dasharray="10, 10" />

  <!-- Texto Principal -->
  <text x="50%" y="40%" font-size="36" text-anchor="middle" fill="#ecf0f1" font-family="sans-serif" font-weight="bold">
    Certificado de Participación
  </text>
  
  <!-- Subtítulo -->
  <text x="50%" y="60%" font-size="24" text-anchor="middle" fill="#bdc3c7" font-family="sans-serif">
    Otorgado a:
  </text>

  <!-- Variables Dinámicas -->
  <text x="50%" y="75%" font-size="32" text-anchor="middle" fill="#e74c3c" font-family="sans-serif" font-weight="bold">
    {{Nombre}}
  </text>

  <text x="50%" y="90%" font-size="20" text-anchor="middle" fill="#bdc3c7" font-family="sans-serif" font-style="italic">
    En el rol de: {{Cargo}}
  </text>
</svg>
